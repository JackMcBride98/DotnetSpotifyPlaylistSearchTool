name: 'Setup .NET Environment'
description: 'Checks out the repository and configures the pinned .NET SDK'

runs:
  using: 'composite'
  steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
        cache: true